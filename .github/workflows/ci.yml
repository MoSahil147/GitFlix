# Runs on every pull request into main and every push to main.
# Catches broken merges before they land, since deployment is handled
# separately by Render's own git integration and is not done here.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Installs backend dependencies with uv and runs the pytest suite.
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - name: Install uv (with caching)
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run tests
        run: uv run pytest

  # Installs frontend dependencies, lints, then does a full build to
  # catch type errors and build breakages.
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
