# Runs on every pull request into main and every push to main.
# Catches broken merges before they land, since deployment is handled
# separately by Render's own git integration and is not done here.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Installs backend dependencies with uv and runs the pytest suite.
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

  # Installs frontend dependencies, lints, then does a full build to
  # catch type errors and build breakages.
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
