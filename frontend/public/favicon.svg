<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0A0A12"/>
  <!-- clapperboard body -->
  <rect x="9" y="23" width="46" height="33" rx="4" fill="#13131F" stroke="#8B5CF6" stroke-width="1.5"/>
  <!-- clapper top bar -->
  <rect x="9" y="10" width="46" height="15" rx="4" fill="#8B5CF6"/>
  <!-- diagonal stripe cutouts on clapper -->
  <clipPath id="c"><rect x="9" y="10" width="46" height="15" rx="4"/></clipPath>
  <g clip-path="url(#c)" fill="#050508">
    <polygon points="18,10 24,10 14,25 8,25"/>
    <polygon points="30,10 36,10 26,25 20,25"/>
    <polygon points="42,10 48,10 38,25 32,25"/>
    <polygon points="54,10 60,10 50,25 44,25"/>
  </g>
  <!-- "Gf" text in italic serif -->
  <text x="32" y="49" text-anchor="middle" font-family="Georgia,serif" font-size="20" font-weight="bold" font-style="italic" fill="#8B5CF6">Gf</text>
</svg>
